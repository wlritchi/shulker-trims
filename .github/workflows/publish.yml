name: Publish

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'      # 1.0.0
      - '[0-9]+.[0-9]+.[0-9]+-*'    # 1.0.0-rc2, 1.0.0-beta.1

env:
  java_version: 21

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for GitHub Releases
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Java ${{ env.java_version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: ${{ env.java_version }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c  # v5.0.2
        with:
          cache-disabled: true

      - name: Build all modules
        run: ./gradlew build

      - name: Attest universal JAR
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2.4.0
        with:
          subject-path: build/forgix/shulker-trims-*.jar

      - name: Detect version type
        id: version-type
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "type=release" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *"-alpha"* ]]; then
            echo "type=alpha" >> $GITHUB_OUTPUT
          else
            echo "type=beta" >> $GITHUB_OUTPUT
          fi

      - name: Publish to Modrinth and GitHub
        uses: Kir-Antipov/mc-publish@995edadc13559a8b28d0b7e6571229f067ec7659  # v3.3.0
        with:
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-generate-changelog: true

          files: build/forgix/shulker-trims-*.jar
          version: ${{ github.ref_name }}
          version-type: ${{ steps.version-type.outputs.type }}
          loaders: |
            fabric
            paper
          java: ${{ env.java_version }}
